<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #080808;
  --accent-color: #fe2c55;
  --container-bg: rgba(255, 255, 255, 0.08);
  --text-color: #ffffff;
  --card-bg: rgba(255, 255, 255, 0.1);
  --yt-red: #ff0000;
  --wa-green: #25D366;
  --tt-black: #010101;
}

/* کاپی روکنے کے لیے CSS */
body {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite; /* اینیمیٹڈ بیک گراؤنڈ */
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  color: var(--text-color);
  overflow-x: hidden;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  background: var(--container-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 40px 30px;
  border-radius: 30px;
  width: 100%;
  max-width: 450px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  /* انٹری اینیمیشن */
  animation: slideUpMain 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes slideUpMain {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

/* سوشل بٹنز کی اینیمیشن */
.social-header {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
  animation: fadeIn 1.5s ease;
}

.social-btn {
  padding: 10px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.btn-yt { background: var(--yt-red); }
.btn-tt { background: var(--tt-black); }
.btn-wa { background: var(--wa-green); }

.social-btn:hover {
  transform: translateY(-5px) scale(1.05);
  filter: brightness(1.2);
}

/* نیا ٹک ٹاک ڈاؤنلوڈر بٹن اسٹائل */
.tt-downloader-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 0, 0, 0.5);
  color: #fff;
  text-decoration: none;
  padding: 8px 15px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 25px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.tt-downloader-link:hover {
  background: #fe2c55;
  border-color: #fe2c55;
}

.logo-icon { 
  font-size: 60px; 
  color: #fff; 
  margin-bottom: 15px;
  animation: pulse 2s infinite; 
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.input-wrapper {
  background: var(--card-bg);
  border-radius: 15px;
  padding: 8px;
  display: flex;
  align-items: center;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.input-wrapper:focus-within {
  background: rgba(255,255,255,0.15);
  border-color: #fff;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 12px;
  color: white;
  outline: none;
  font-size: 14px;
}

input::placeholder { color: rgba(255,255,255,0.6); }

.control-btn { 
  background: rgba(255,255,255,0.1); 
  border: none; 
  color: #fff; 
  padding: 8px 12px; 
  cursor: pointer; 
  font-weight: 600; 
  border-radius: 10px;
  margin-left: 5px;
  transition: 0.3s;
}
.control-btn:hover { background: #fff; color: #000; }

.main-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 15px;
  background: #fff;
  color: #000;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  font-size: 16px;
  transition: 0.4s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.main-btn:active { transform: scale(0.95); }
.main-btn:hover { background: var(--yt-red); color: #fff; }

/* ویڈیو رزلٹ کارڈ */
.video-info-card {
  margin-top: 30px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: slideUpMain 0.6s ease-out;
}

.thumb-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(1, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.stat-item {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 15px;
  font-size: 14px;
}

.download-link {
  display: block;
  text-align: center;
  background: linear-gradient(90deg, #ff0000, #cc0000);
  color: #fff;
  padding: 15px;
  border-radius: 15px;
  text-decoration: none;
  font-weight: 800;
  transition: 0.3s;
  cursor: pointer;
}

.download-link:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,0,0,0.4); }

@keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

</style>
</head>

    </a>

    </a>
  </div>

  <a href="https://ymedia763-cyber.github.io/tiktokvieo/" target="_blank" class="tt-downloader-link">
    <svg viewBox="0 0 448 512" width="16" fill="white"><path d="M448 209.91a210.06 210.06 0 0 1-122.77-39.25V349.38A162.55 162.55 0 1 1 185 188.31V278.2a74.62 74.62 0 1 0 52.23 71.18V0l88 0a121.18 121.18 0 0 0 1.86 22.17h.03a122.18 122.18 0 0 0 10.85 31.37 128.9 128.9 0 0 0 110.16 69.43v87.94z"/></svg>
    Try TikTok Video Downloader

  <div class="logo-icon"><i class="fab fa-youtube"></i></div>
  <h2 style="margin:0 0 25px 0; font-weight: 700; letter-spacing: -1px;">YT Thumbnail Downloader</h2>
  
  <div class="input-wrapper">
    <input type="text" id="url" placeholder="Paste YouTube link here..." autocomplete="off">
    <button class="control-btn" onclick="pasteLink()">PASTE</button>

<script>
// سیکیورٹی
document.onkeydown = function(e) {
  if(e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73)) {
    return false;
  }
};

async function pasteLink() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("url").value = text;
  } catch (err) {
    alert("Please allow clipboard access or paste manually.");
  }
}

function getYouTubeID(url) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
}

function fetchVideo() {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");
  const videoId = getYouTubeID(url);

  if (!url || !videoId) { 
    alert("Please paste a valid YouTube link!"); 
    return; 
  }

  result.innerHTML = '<p style="margin-top:20px; animation: fadeIn 0.5s infinite alternate;">🚀 Fetching Thumbnail...</p>';

  // YouTube Thumbnail URL (Max Resolution)
  const thumbUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

  setTimeout(() => {
      result.innerHTML = `
        <div class="video-info-card">
          <img src="${thumbUrl}" class="thumb-img" onerror="this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg'">
          
          <div class="stats-grid">
            <div class="stat-item"><b>Video ID:</b> ${videoId}</div>
          </div>

          <a class="download-link" onclick="forceDownload('${thumbUrl}', 'youtube_thumbnail.jpg')">
            <i class="fas fa-cloud-download-alt"></i> DOWNLOAD IMAGE
          </a>
        </div>
      `;
  }, 800);
}

async function forceDownload(imgUrl, fileName) {
  try {
    const response = await fetch(imgUrl);
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
  } catch (e) {
    // Fallback if fetch is blocked by CORS
    window.open(imgUrl, '_blank');
    alert("If download doesn't start, long press the image to save.");
  }
}
</script>
